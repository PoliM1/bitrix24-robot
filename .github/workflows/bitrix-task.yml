name: Create Bitrix24 Task

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  create-task:
    runs-on: ubuntu-latest
    steps:
      - name: Call Bitrix robot
        run: |
          curl -L "https://bitrix24-robot.onrender.com/bitrix/task/create?title=%D0%95%D0%B6%D0%B5%D0%B4%D0%BD%D0%B5%D0%B2%D0%BD%D0%B0%D1%8F%20%D0%B7%D0%B0%D0%B4%D0%B0%D1%87%D0%B0&responsible_id=1"
